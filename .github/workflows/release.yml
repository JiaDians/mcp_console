name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release-windows:
    name: Build & Release Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows (Release)
        run: flutter build windows --release

      - name: Install NSIS
        run: choco install nsis --yes --no-progress

      - name: Create NSIS installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $outDir = "build\windows\x64\runner\Release"
          $installerName = "MCP_Console_${{ github.ref_name }}_Setup.exe"
          @"
          !define APP_NAME "MCP Console"
          !define APP_VERSION "$version"
          !define APP_EXE "mcp_console.exe"
          !define OUT_FILE "$installerName"

          Name "`${APP_NAME} `${APP_VERSION}"
          OutFile "`${OUT_FILE}"
          InstallDir "`$PROGRAMFILES64\MCP Console"
          InstallDirRegKey HKCU "Software\MCP Console" ""
          RequestExecutionLevel admin
          SetCompressor /SOLID lzma

          Page directory
          Page instfiles
          UninstPage uninstConfirm
          UninstPage instfiles

          Section "Install"
            SetOutPath `$INSTDIR
            File /r "${outDir}\*.*"
            CreateShortcut "`$DESKTOP\MCP Console.lnk" "`$INSTDIR\`${APP_EXE}"
            CreateDirectory "`$SMPROGRAMS\MCP Console"
            CreateShortcut "`$SMPROGRAMS\MCP Console\MCP Console.lnk" "`$INSTDIR\`${APP_EXE}"
            CreateShortcut "`$SMPROGRAMS\MCP Console\Uninstall.lnk" "`$INSTDIR\Uninstall.exe"
            WriteUninstaller "`$INSTDIR\Uninstall.exe"
            WriteRegStr HKCU "Software\Microsoft\Windows\CurrentVersion\Uninstall\MCP Console" "DisplayName" "MCP Console"
            WriteRegStr HKCU "Software\Microsoft\Windows\CurrentVersion\Uninstall\MCP Console" "UninstallString" "`$INSTDIR\Uninstall.exe"
            WriteRegStr HKCU "Software\Microsoft\Windows\CurrentVersion\Uninstall\MCP Console" "DisplayVersion" "`${APP_VERSION}"
            WriteRegStr HKCU "Software\Microsoft\Windows\CurrentVersion\Uninstall\MCP Console" "Publisher" "JiaDians"
          SectionEnd

          Section "Uninstall"
            RMDir /r `$INSTDIR
            Delete "`$DESKTOP\MCP Console.lnk"
            RMDir /r "`$SMPROGRAMS\MCP Console"
            DeleteRegKey HKCU "Software\Microsoft\Windows\CurrentVersion\Uninstall\MCP Console"
          SectionEnd
          "@ | Out-File -FilePath installer.nsi -Encoding UTF8
          & "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi
          echo "INSTALLER_NAME=$installerName" >> $env:GITHUB_ENV

      - name: Package portable zip
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $outDir = "build\windows\x64\runner\Release"
          $zipName = "MCP_Console_${version}_windows_portable.zip"
          Compress-Archive -Path "$outDir\*" -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Extract release notes
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          $changelog = "CHANGELOG.md"
          $notesPath = "release_notes.md"

          if (!(Test-Path $changelog)) {
            throw "CHANGELOG.md not found. Add a changelog entry before pushing $tag."
          }

          $lines = Get-Content $changelog -Encoding UTF8
          $patterns = @(
            "^##\s+\[$([regex]::Escape($version))\]",
            "^##\s+\[$([regex]::Escape($tag))\]",
            "^##\s+MCP Console\s+$([regex]::Escape($tag))\b",
            "^##\s+$([regex]::Escape($tag))\b",
            "^##\s+$([regex]::Escape($version))\b"
          )

          $start = -1
          for ($i = 0; $i -lt $lines.Count; $i++) {
            foreach ($pattern in $patterns) {
              if ($lines[$i] -match $pattern) {
                $start = $i
                break
              }
            }
            if ($start -ge 0) { break }
          }

          if ($start -lt 0) {
            throw "No changelog section found for $tag. Add '## [$version] - YYYY-MM-DD' to CHANGELOG.md."
          }

          $end = $lines.Count
          for ($i = $start + 1; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -match "^##\s+") {
              $end = $i
              break
            }
          }

          $section = $lines[$start..($end - 1)]
          $contentLines = $section | Where-Object { $_.Trim().Length -gt 0 }
          if ($contentLines.Count -le 1) {
            throw "Changelog section for $tag is empty."
          }

          $section | Set-Content $notesPath -Encoding UTF8
          echo "RELEASE_NOTES=$notesPath" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "MCP Console ${{ github.ref_name }}"
          body_path: ${{ env.RELEASE_NOTES }}
          files: |
            ${{ env.INSTALLER_NAME }}
            ${{ env.ZIP_NAME }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
